<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>La Gerencia</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
  /* Fondo directo en body como respaldo */
  body {
    background-color: #0b0b0b;
    background-image:
      linear-gradient(180deg, rgba(11,11,11,.78) 0%, rgba(11,11,11,.88) 60%, #0b0b0b 100%),
      url("./imagenes/fondo.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }

  /* "LA GERENCIA" arriba del formulario */
  .gate-brand {
    text-align: center;
    margin-bottom: 22px;
  }
  .gate-brand .gb-title {
    font-family: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 600;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: #c5a059;
    text-shadow: 0 0 30px rgba(197,160,89,.35), 0 2px 8px rgba(0,0,0,.7);
    line-height: 1;
    display: block;
  }
  .gate-brand .gb-rule {
    display: block;
    margin: 9px auto 0;
    width: 90px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(197,160,89,.7), transparent);
  }

  /* Logo de respaldo si el JS no lo pone */
  .gate-side-logo-fallback img {
    width: 210px;
    height: 210px;
    object-fit: contain;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,.6));
    animation: float 4s ease-in-out infinite;
    display: block;
    margin: 0 auto;
  }
  .gate-side-logo-fallback span {
    display: block;
    margin-top: 14px;
    font-family: "Cormorant Garamond", Georgia, serif;
    color: #c5a059;
    font-size: 16px;
    letter-spacing: .2em;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
(function () {
  var done = false;

  function inject() {
    if (done) return;

    var form = document.querySelector('.gate-form');
    if (!form) return;
    if (form.querySelector('.gate-brand')) { done = true; return; }

    done = true;

    /* 1) Inyecta "LA GERENCIA" como primer elemento del formulario */
    var brand = document.createElement('div');
    brand.className = 'gate-brand';
    brand.innerHTML =
      '<span class="gb-title">La Gerencia</span>' +
      '<span class="gb-rule"></span>';
    form.insertBefore(brand, form.firstChild);

    /* 2) Si el panel derecho no tiene logo, lo agrega */
    var side = document.querySelector('.gate-side');
    if (side && !side.querySelector('img')) {
      var wrap = document.createElement('div');
      wrap.className = 'gate-side-logo-fallback';
      wrap.innerHTML =
        '<img src="./imagenes/logo.png" alt="La Gerencia" />' +
        '<span>La Gerencia</span>';
      side.appendChild(wrap);
    }
  }

  inject();
  var obs = new MutationObserver(function () {
    inject();
    if (done) obs.disconnect();
  });
  obs.observe(document.body, { childList: true, subtree: true });
  setTimeout(function () { obs.disconnect(); }, 8000);
})();
</script>

</body>
</html>
