<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>La Gerencia</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
  /* Anular el ::before del CSS para que no tape nuestro fondo div */
  body::before { background: none !important; animation: none !important; }

  /* Logo más grande */
  img.logo {
    width: 300px !important;
    height: 300px !important;
    object-fit: contain !important;
  }

  /* "LA GERENCIA" dentro del panel izquierdo */
  .gate-brand { text-align: center; margin-bottom: 24px; }
  .gate-brand .gb-title {
    font-family: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    font-size: clamp(26px, 4.5vw, 40px);
    font-weight: 600;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: #c5a059;
    text-shadow: 0 0 30px rgba(197,160,89,.35), 0 2px 8px rgba(0,0,0,.7);
    display: block;
  }
  .gate-brand .gb-rule {
    display: block;
    margin: 10px auto 0;
    width: 90px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(197,160,89,.7), transparent);
  }
</style>
</head>
<body>

<!-- ══ FONDO FIJO — no lo toca ni el CSS ni el app.js ══ -->
<!-- Imagen de carne -->
<div style="
  position:fixed; inset:0; z-index:-3; pointer-events:none;
  background: url('../imagenes/fondo.jpg') center/cover no-repeat;
"></div>
<!-- Capa oscura semitransparente encima -->
<div style="
  position:fixed; inset:0; z-index:-2; pointer-events:none;
  background: linear-gradient(180deg,
    rgba(11,11,11,.42) 0%,
    rgba(11,11,11,.50) 60%,
    rgba(11,11,11,.70) 100%);
"></div>

<div id="app"></div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
(function () {
  var formDone = false;

  function fixAll() {
    /* Corregir src del logo (app.js lo pone con ruta incorrecta) */
    document.querySelectorAll('img.logo, img[src*="imagenes/logo"]').forEach(function(img) {
      if (!img.dataset.fixed) {
        img.dataset.fixed = '1';
        img.src = '../imagenes/logo.png';
        img.style.width  = '300px';
        img.style.height = '300px';
      }
    });

    /* Inyectar "LA GERENCIA" arriba del formulario */
    if (!formDone) {
      var form = document.querySelector('.gate-form');
      if (form && !form.querySelector('.gate-brand')) {
        formDone = true;
        var brand = document.createElement('div');
        brand.className = 'gate-brand';
        brand.innerHTML =
          '<span class="gb-title">La Gerencia</span>' +
          '<span class="gb-rule"></span>';
        form.insertBefore(brand, form.firstChild);
      }
    }
  }

  fixAll();
  var obs = new MutationObserver(fixAll);
  obs.observe(document.body, {
    childList: true, subtree: true,
    attributes: true, attributeFilter: ['src']
  });
  setTimeout(function () { obs.disconnect(); }, 10000);
})();
</script>

</body>
</html>
