<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>La Gerencia</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
  /*
   * CORRECCIÓN DE RUTAS:
   * Este archivo vive en /control/index.html
   * Las imágenes están en /imagenes/ (raíz)
   * Por eso la ruta correcta es ../imagenes/ (subir un nivel)
   */

  /* Fondo: override del body::before del CSS */
  body::before {
    background:
      linear-gradient(180deg, rgba(11,11,11,.78) 0%, rgba(11,11,11,.88) 60%, #0b0b0b 100%),
      url("../imagenes/fondo.jpg") center/cover no-repeat fixed !important;
  }

  /* Logo del panel derecho: override del app-mode */
  body.app-mode .topbar::before {
    background-image: url("../imagenes/logo.png") !important;
  }

  /* "LA GERENCIA" arriba del formulario de login */
  .gate-brand {
    text-align: center;
    margin-bottom: 24px;
  }
  .gate-brand .gb-title {
    font-family: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    font-size: clamp(26px, 4.5vw, 40px);
    font-weight: 600;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: #c5a059;
    text-shadow: 0 0 30px rgba(197,160,89,.35), 0 2px 8px rgba(0,0,0,.7);
    line-height: 1;
    display: block;
  }
  .gate-brand .gb-rule {
    display: block;
    margin: 10px auto 0;
    width: 90px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(197,160,89,.7), transparent);
  }

  /* Logo en panel derecho si el JS no lo cargó */
  .gate-logo-inject {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  .gate-logo-inject img {
    width: 200px;
    height: 200px;
    object-fit: contain;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,.6));
    animation: float 4s ease-in-out infinite;
  }
  .gate-logo-inject span {
    font-family: "Cormorant Garamond", Georgia, serif;
    color: #c5a059;
    font-size: 15px;
    letter-spacing: .22em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
(function () {
  var injected = false;

  function inject() {
    if (injected) return;

    var form = document.querySelector('.gate-form');
    if (!form) return;
    if (form.querySelector('.gate-brand')) { injected = true; return; }

    injected = true;

    /* 1) "LA GERENCIA" como primer elemento del formulario */
    var brand = document.createElement('div');
    brand.className = 'gate-brand';
    brand.innerHTML =
      '<span class="gb-title">La Gerencia</span>' +
      '<span class="gb-rule"></span>';
    form.insertBefore(brand, form.firstChild);

    /* 2) Logo en el panel derecho (ruta corregida: ../imagenes/) */
    var side = document.querySelector('.gate-side');
    if (side && !side.querySelector('img')) {
      var wrap = document.createElement('div');
      wrap.className = 'gate-logo-inject';
      wrap.innerHTML =
        '<img src="../imagenes/logo.png" alt="La Gerencia" />' +
        '<span>La Gerencia</span>';
      side.appendChild(wrap);
    }
  }

  /* Corre inmediatamente y observa el DOM */
  inject();
  var obs = new MutationObserver(function () {
    inject();
    if (injected) obs.disconnect();
  });
  obs.observe(document.body, { childList: true, subtree: true });
  setTimeout(function () { obs.disconnect(); }, 8000);
})();
</script>

</body>
</html>
