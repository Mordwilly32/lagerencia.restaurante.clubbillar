<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>La Gerencia · Control</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
<style>
body::before {
  background:
    linear-gradient(180deg, rgba(11,11,11,.78) 0%, rgba(11,11,11,.88) 60%, #0b0b0b 100%),
    url("../imagenes/fondo.jpg") center/cover no-repeat fixed !important;
  animation: bgZoom 30s ease-in-out infinite alternate;
}
.gate-brand {
  text-align: center;
  margin-bottom: 24px;
}
.gate-brand .gb-title {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: clamp(22px, 4vw, 34px);
  font-weight: 600;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: #c5a059;
  text-shadow: 0 0 32px rgba(197,160,89,.38), 0 2px 8px rgba(0,0,0,.7);
  display: block;
}
.gate-brand .gb-rule {
  display: block;
  margin: 10px auto 0;
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(197,160,89,.7), transparent);
}
.form-group { margin-bottom: 16px; }
.recaptcha-wrap {
  margin-top: 14px;
  display: flex;
  justify-content: center;
}
#login-msg {
  font-size: 13px;
  margin-top: 10px;
  font-weight: 500;
  animation: fadeIn .3s ease-out;
  display: none;
}
#login-msg.err { color: #ff6b6b; }
#login-msg.ok  { color: #7bc88a; }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">

    <div class="gate-form">
      <div class="gate-brand">
        <span class="gb-title">La Gerencia</span>
        <span class="gb-rule"></span>
      </div>

      <h2>Iniciar Sesión</h2>

      <input class="hp" type="text" name="website" tabindex="-1" autocomplete="off" />

      <div class="form-group">
        <label for="inp-user">Usuario</label>
        <input id="inp-user" type="text" placeholder="Tu nombre de usuario" autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="inp-pass">Contraseña</label>
        <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="recaptcha-wrap">
        <div id="recaptcha-box"></div>
      </div>

      <div id="login-msg"></div>

      <button id="btn-login" style="margin-top:20px;width:100%;padding:13px">
        Ingresar
      </button>
    </div>

    <div class="gate-side">
      <img class="logo" src="../imagenes/logo.png" alt="La Gerencia" />
      <p class="eyebrow" style="margin:0">Panel de Control</p>
      <p class="muted" style="font-size:12px;margin:4px 0 0">Sistema de gestión interno</p>
    </div>

  </div>
</div>

<div id="app" style="display:none"></div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
window.onRecaptchaLoad = function () {
  grecaptcha.render("recaptcha-box", {
    sitekey: window.RECAPTCHA_SITE_KEY,
    theme: "dark"
  });
};
</script>

<script src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoad&render=explicit" async defer></script>

<script>
(function () {
  "use strict";
  var CFG = window.APP_CONFIG || {};

  async function sha256(msg) {
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf))
      .map(function (b) { return b.toString(16).padStart(2, "0"); })
      .join("");
  }

  function showMsg(text, type) {
    var el = document.getElementById("login-msg");
    el.style.display = "block";
    el.className = type;
    el.textContent = text;
  }

  function shake(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove("shake");
    void el.offsetWidth;
    el.classList.add("shake");
    el.addEventListener("animationend", function () { el.classList.remove("shake"); }, { once: true });
  }

  document.getElementById("btn-login").addEventListener("click", async function () {
    var hp = document.querySelector(".hp");
    if (hp && hp.value) return;

    var user  = document.getElementById("inp-user").value.trim();
    var pass  = document.getElementById("inp-pass").value;
    var token = typeof grecaptcha !== "undefined" ? grecaptcha.getResponse() : "";

    if (!user)  { shake("inp-user"); showMsg("Ingresa tu usuario.", "err");      return; }
    if (!pass)  { shake("inp-pass"); showMsg("Ingresa tu contraseña.", "err");   return; }
    if (!token) { showMsg("Completa el reCAPTCHA primero.", "err");              return; }

    this.disabled    = true;
    this.textContent = "Verificando…";

    var hash  = await sha256(pass);
    var users = CFG.USERS || [];
    var found = users.find(function (u) {
      return u.username.toLowerCase() === user.toLowerCase() && u.passwordHash === hash;
    });

    if (found) {
      try {
        localStorage.setItem("lg_session", JSON.stringify({ username: found.username, ts: Date.now() }));
      } catch (e) {}
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display  = "block";
      document.body.classList.add("app-mode");
      if (typeof window.renderApp === "function") window.renderApp(found.username);
    } else {
      showMsg("Usuario o contraseña incorrectos.", "err");
      shake("inp-user");
      shake("inp-pass");
      if (typeof grecaptcha !== "undefined") grecaptcha.reset();
      this.disabled    = false;
      this.textContent = "Ingresar";
    }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && document.getElementById("gate").style.display !== "none") {
      document.getElementById("btn-login").click();
    }
  });

  try {
    var sess = JSON.parse(localStorage.getItem("lg_session"));
    if (sess && sess.username && (Date.now() - sess.ts) < 28800000) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display  = "block";
      document.body.classList.add("app-mode");
      if (typeof window.renderApp === "function") window.renderApp(sess.username);
    }
  } catch (e) {}
})();
</script>
</body>
</html>
