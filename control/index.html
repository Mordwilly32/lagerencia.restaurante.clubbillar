<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>La Gerencia · Control</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
<style>
  /* ── Fondo con blur suave ── */
  body::before {
    background-image:
      linear-gradient(180deg, rgba(11,11,11,.52) 0%, rgba(11,11,11,.60) 60%, rgba(11,11,11,.78) 100%),
      url("../imagenes/fondo.jpg") !important;
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    background-attachment: fixed !important;
    filter: blur(5px) !important;
    transform: scale(1.06) !important;
  }

  /* ── Logo más grande en el panel derecho ── */
  .gate-side img.logo {
    width: 280px !important;
    height: 280px !important;
    object-fit: contain !important;
    filter: drop-shadow(0 8px 28px rgba(0,0,0,.75)) !important;
  }

  /* ── Nombre del restaurante sobre el formulario ── */
  .gate-brand {
    text-align: center;
    margin-bottom: 28px;
  }
  .gate-brand .gb-title {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: clamp(24px, 4vw, 38px);
    font-weight: 600;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: #c5a059;
    text-shadow: 0 0 32px rgba(197,160,89,.38), 0 2px 8px rgba(0,0,0,.7);
    display: block;
  }
  .gate-brand .gb-rule {
    display: block;
    margin: 10px auto 0;
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(197,160,89,.7), transparent);
  }
</style>
</head>
<body>
<div id="app"></div>

<!-- config.js define window.APP_CONFIG desde el base64 -->
<script src="./config.js"></script>

<!-- app.js contiene toda la lógica (renderGate, renderApp, makeChallenge, etc.) -->
<script src="./app.js"></script>

<script>
/* ─────────────────────────────────────────────────────────────
   Parche de UI: inyecta el nombre y corrige rutas del logo.
   Se ejecuta inmediatamente y sigue observando cambios del DOM
   hasta que el app termine de renderizar (máx. 8 s).
───────────────────────────────────────────────────────────── */
(function () {
  var brandInjected = false;

  function patch() {
    /* 1. Corregir ruta del logo (control/ está un nivel más adentro) */
    document.querySelectorAll('img.logo, img[src*="imagenes/logo"]').forEach(function (img) {
      if (!img.dataset.fixed) {
        img.dataset.fixed = '1';
        img.src = '../imagenes/logo.png';
      }
    });

    /* 2. Insertar "La Gerencia" encima del <h2>Iniciar Sesión</h2> */
    if (!brandInjected) {
      var form = document.querySelector('.gate-form');
      if (form && !form.querySelector('.gate-brand')) {
        brandInjected = true;
        var brand = document.createElement('div');
        brand.className = 'gate-brand';
        brand.innerHTML =
          '<span class="gb-title">La Gerencia</span>' +
          '<span class="gb-rule"></span>';
        form.insertBefore(brand, form.firstChild);
      }
    }
  }

  patch();
  var obs = new MutationObserver(patch);
  obs.observe(document.body, { childList: true, subtree: true });
  setTimeout(function () { obs.disconnect(); }, 8000);
})();
</script>
</body>
</html>
